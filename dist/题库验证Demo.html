<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学飞行棋 · 题库验证</title>
<style>
/* ===== Design Tokens — Purple Night Palette ===== */
:root {
  --bg: #0f0f23;
  --surface: #1e1d35;
  --surface-hover: #262544;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #636378;
  --accent: #a78bfa;
  --accent-hover: #c4b5fd;
  --accent-light: rgba(167, 139, 250, 0.15);
  --accent-dark: #7c3aed;
  --border: rgba(255, 255, 255, 0.08);
  --shadow: rgba(0, 0, 0, 0.4);
  --success: #34c759;
  --warning: #fbbf24;
  --danger: #ef4444;

  /* Spacing */
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;

  /* Radius */
  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-2xl: 20px; --r-full: 9999px;

  /* Easing */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
  --duration-fast: 150ms; --duration-base: 250ms; --duration-slow: 350ms;
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
  font-size: 1rem; line-height: 1.6;
  color: var(--text-primary);
  background: linear-gradient(135deg, #0f0f23 0%, #1e1d35 50%, #0f3460 100%);
  min-height: 100vh;
  padding: var(--sp-6);
}

/* ===== Header ===== */
.header {
  text-align: center;
  padding: var(--sp-5) var(--sp-6);
  background: rgba(0, 0, 0, 0.3);
  border-bottom: 3px solid var(--accent);
  border-radius: var(--r-xl);
  backdrop-filter: blur(12px);
  max-width: 900px;
  margin: 0 auto var(--sp-6);
}
.header h1 { font-size: 1.8em; font-weight: 700; color: var(--warning); letter-spacing: 0.02em; }
.header p { color: var(--text-secondary); margin-top: var(--sp-2); font-size: 0.9em; }

/* ===== Controls ===== */
.controls {
  display: flex;
  gap: var(--sp-3);
  align-items: center;
  max-width: 900px;
  margin: 0 auto var(--sp-6);
  flex-wrap: wrap;
}
select {
  flex: 1; min-width: 160px;
  padding: var(--sp-3) var(--sp-4);
  border: 2px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  color: var(--text-primary);
  font-size: 0.95em;
  font-family: inherit;
  cursor: pointer;
  transition: border-color var(--duration-fast) var(--ease-out);
}
select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
select option { background: var(--surface); }

.btn {
  padding: var(--sp-3) var(--sp-5);
  background: linear-gradient(135deg, var(--accent-dark), var(--accent));
  border: none;
  border-radius: var(--r-md);
  color: #fff;
  font-size: 0.95em;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
  transition: all var(--duration-base) var(--ease-out);
  /* Start from scale(0.95) per motion guidelines */
  transform: scale(0.97);
  opacity: 0.9;
}
.btn:hover {
  transform: translateY(-2px) scale(1);
  opacity: 1;
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.45);
}
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* ===== Section ===== */
.section {
  max-width: 900px;
  margin: 0 auto var(--sp-6);
}
.section h2 {
  color: var(--accent);
  font-size: 1em;
  font-weight: 600;
  letter-spacing: 0.03em;
  margin-bottom: var(--sp-3);
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

/* ===== Question Grid ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--sp-3);
}

/* ===== Question Card ===== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--sp-4);
  display: flex;
  align-items: center;
  gap: var(--sp-3);
  transition:
    transform var(--duration-base) var(--ease-out),
    box-shadow var(--duration-base) var(--ease-out),
    border-color var(--duration-fast);
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--shadow);
}
.card .q-text {
  flex: 1;
  font-size: 1.15em;
  font-weight: 700;
  color: var(--warning);
  font-variant-numeric: tabular-nums;
}
.card .q-meta {
  font-size: 0.75em;
  color: var(--text-muted);
  text-align: right;
  min-width: 80px;
}
.card .q-status {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.card.pass { border-color: rgba(52, 199, 89, 0.4); }
.card.pass .q-status { background: var(--success); }
.card.fail { border-color: rgba(239, 68, 68, 0.4); }
.card.fail .q-status { background: var(--danger); }
.card.example { border-color: rgba(167, 139, 250, 0.3); }
.card.example .q-status { background: var(--accent); }

/* ===== Summary ===== */
.summary {
  max-width: 900px;
  margin: 0 auto;
  padding: var(--sp-4) var(--sp-5);
  background: var(--surface);
  border-radius: var(--r-xl);
  border: 1px solid var(--border);
  font-size: 0.95em;
  display: flex;
  align-items: center;
  gap: var(--sp-3);
}
.summary .icon { font-size: 1.4em; }
.summary .pass { color: var(--success); font-weight: 600; }
.summary .fail { color: var(--danger); font-weight: 600; }
.summary details { margin-top: var(--sp-2); }
.summary pre { margin-top: var(--sp-2); font-size: 0.85em; color: var(--danger); white-space: pre-wrap; }

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .header h1 { font-size: 1.4em; }
}

/* ===== Reduced Motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<div class="header">
  <h1>🎲 数学飞行棋 · 题库验证 Demo</h1>
  <p>选择年级学期，生成10道随机题目，验证运算规则是否符合课纲</p>
</div>

<div class="controls">
  <select id="gradeSelect" aria-label="选择年级学期">
    <option value="1上">1年级·上</option>
    <option value="1下">1年级·下</option>
    <option value="2上">2年级·上</option>
    <option value="2下">2年级·下</option>
    <option value="3上">3年级·上</option>
    <option value="3下">3年级·下</option>
    <option value="4上">4年级·上</option>
    <option value="4下">4年级·下</option>
    <option value="5上">5年级·上</option>
    <option value="5下">5年级·下</option>
    <option value="6上">6年级·上</option>
    <option value="6下">6年级·下</option>
  </select>
  <button class="btn" id="generateBtn" aria-label="生成10道题验证">🎲 生成10道题验证</button>
</div>

<div id="result"></div>
<div id="summary"></div>

</body>
</html>
